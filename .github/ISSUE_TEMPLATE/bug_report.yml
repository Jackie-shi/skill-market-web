name: 🐛 Bug Report
description: Report a bug on Skill Market
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect?
      placeholder: "When I click 'Download', nothing happens..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      value: |
        1. Go to '...'
        2. Click on '...'
        3. See error
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Search / Browse
        - Skill Detail Page
        - Publish / Upload
        - Payment / Checkout
        - Profile / Account
        - Install / Download
        - Other
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "Chrome 120 / macOS 14"
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots.
